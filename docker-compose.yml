services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - INTERNAL_API_URL=http://backend:4000
    networks:
      - alpex-network
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app:cached
      - backend_node_modules:/app/node_modules
    environment:
      - DATABASE_URL=postgresql://alpex_user:alpex_pass@database:5432/alpex_db
    networks:
      - alpex-network
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:16
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=alpex_user
      - POSTGRES_PASSWORD=alpex_pass
      - POSTGRES_DB=alpex_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./comprehensive_seed.sql:/docker-entrypoint-initdb.d/1-comprehensive_seed.sql
      - ./seed_inventory.sql:/docker-entrypoint-initdb.d/2-seed_inventory.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpex_user -d alpex_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - alpex-network

networks:
  alpex-network:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
  backend_node_modules:
